output_lang: vi

# Lăng kính chính cho bản tin kinh tế - tài chính cá nhân.
tracking:
  - kinh tế Việt Nam, tăng trưởng GDP, lạm phát và đầu tư công
  - chính sách tiền tệ, lãi suất, tỷ giá, thanh khoản và tăng trưởng tín dụng
  - ngân hàng Việt Nam, chất lượng tài sản, NIM, CASA và nợ xấu
  - VN-Index, trái phiếu, hàng hóa, ngoại hối và thị trường vốn
  - kết quả kinh doanh, dòng tiền, biên lợi nhuận và định giá doanh nghiệp
  - CFA, phân bổ tài sản, quản trị danh mục và quản trị rủi ro
  - kinh tế Mỹ, Trung Quốc và ASEAN
  - thương mại quốc tế, chuỗi cung ứng và địa chính trị

# AI/deep tech vẫn được giữ, nhưng chỉ ưu tiên khi có tác động kinh tế rõ ràng.
deep_tech_tracking:
  - AI và tự động hóa tác động tới năng suất, việc làm hoặc chi phí doanh nghiệp
  - bán dẫn, chip, thiết bị sản xuất và kiểm soát xuất khẩu
  - hạ tầng dữ liệu, điện toán đám mây và an ninh mạng có tác động kinh tế
  - pin, năng lượng, robotics và công nghệ công nghiệp

category_priorities:
