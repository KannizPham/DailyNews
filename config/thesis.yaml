what_counts_as_matters: >
  Ưu tiên thông tin mới trong 24 giờ có thể thay đổi triển vọng tăng trưởng,
  lạm phát, lãi suất, tỷ giá, lợi nhuận doanh nghiệp, định giá tài sản hoặc mức
  rủi ro danh mục. Với AI/công nghệ, chỉ ưu tiên khi có kênh truyền dẫn kinh tế
  rõ ràng; không ưu tiên launch sản phẩm, benchmark hoặc model release thuần túy.

