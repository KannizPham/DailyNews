name = "ban-tin-kinh-te-thi-truong"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Vars không nhạy cảm (owner/repo để gọi GitHub repository_dispatch).
# Secret thật (GEMINI_API_KEY, TELEGRAM_BOT_TOKEN, GITHUB_PAT) set bằng
# `wrangler secret put <NAME>`, KHÔNG để ở đây (xem README phần Cloudflare).
[vars]
GITHUB_OWNER = "KannizPham"
GITHUB_REPO = "DailyNews"
# Danh sách model là optional; để rỗng thì Worker tự chọn từ models.list.
GEMINI_MODELS = ""
LLM_MAX_ATTEMPTS = "1"
# Phải điền chat ID thật trước khi deploy. Group ID âm được hỗ trợ.
ADMIN_CHAT_IDS = ""
ALLOWED_CHAT_IDS = ""

# KV namespace dùng để đọc context item digest do main.py ghi vào (xem
# src/deliver.py::write_items_to_kv). id phải điền sau khi chạy:
#   wrangler kv:namespace create DIGEST_KV
[[kv_namespaces]]
binding = "DIGEST_KV"
id = "0ad7f43199aa41ae9ed5603c057557d7"
