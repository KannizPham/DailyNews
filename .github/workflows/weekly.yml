name: Tổng Hợp Kinh Tế & Thị Trường Tuần

on:
  schedule:
    # Chủ nhật, 0 23 * * 0 UTC = 6h sáng giờ VN Chủ nhật.
    - cron: "0 23 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-weekly-synthesis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly synthesis
        env:
          DRY_RUN: "false"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/weekly.py

      - name: Commit weekly archive
        run: |
          git config user.name "morning-intel-bot"
          git config user.email "actions@github.com"
          git add archive/
          git diff --cached --quiet || git commit -m "chore: weekly synthesis $(date -u +%Y-W%V)"
          git push
